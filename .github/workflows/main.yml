name: Pruebas unitarias
on:
  push:
    branches:
      - "HU**"
jobs:
  job1:
    name: Nombre_commit
    runs-on: ubuntu-latest
    outputs:
      salida: ${{ steps.commit_message.outputs.COMMIT_MSG}}
    steps:
    - name: Checkout de repositorio
      uses: actions/checkout@v4
    - name: Get last commit message
      id: commit_message
      run: |
        echo "COMMIT_MSG=${{ github.event.head_commit.message }}">> $GITHUB_OUTPUT
    - name: Print variable
      run: echo "${{ steps.commit_message.outputs.COMMIT_MSG}}"
  job2:
    name: Pruebas
    needs: job1
    if: ${{ contains( needs.job1.outputs.salida, 'Merge') }}
    runs-on: ubuntu-latest
    outputs:
      salida: ${{ steps.correr-pruebas.outputs.respuesta}}
    steps:
    - name: Checkout de repositorio
      uses: actions/checkout@v2
    - name: Configuración de entorno de python
      uses: actions/setup-python@v5
      with:
          python-version: '3.x'
    - name: Instalación de librerías y dependencias
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt
    - name: Correr pruebas
      id: correr-pruebas
      run: |
        cd backend
        python -m unittest discover -s tests -v
    - name: Validar resultado con errores
      if: ${{ failure() }}
      env:
        MENSAJE_ERROR: Una o varias pruebas fallaron
      run:
        echo "respuesta=$MENSAJE_ERROR">> $GITHUB_OUTPUT
    - name: Validar resultado sin errores
      if: ${{ success() }}
      env:
        MENSAJE_EXITO: Todas las pruebas fueron exitosas
      run: echo "respuesta=$MENSAJE_EXITO">> $GITHUB_OUTPUT
    - name: Cálculo de cubrimiento
      id: cubrimiento
      run: |
          cd backend
          coverage run -m unittest discover -s tests -v
          coverage report -m
    - name: print variable
      run: echo "${{ steps.correr-pruebas.outputs.respuesta}}"
      
